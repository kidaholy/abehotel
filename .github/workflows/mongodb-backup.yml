name: MongoDB Backup to Backblaze B2

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install MongoDB Tools
        run: |
          wget -qO - https://www.mongodb.org/static/pgp/server-7.0.asc | sudo apt-key add -
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update -qq
          sudo apt-get install -y mongodb-database-tools

      - name: Run mongodump
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="backup_${TIMESTAMP}.gz"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV

          mongodump \
            --uri="${{ secrets.MONGODB_URI }}" \
            --archive="$BACKUP_FILE" \
            --gzip

          echo "✅ Backup created: $BACKUP_FILE ($(du -sh $BACKUP_FILE | cut -f1))"

      - name: Install AWS CLI (S3-compatible for B2)
        run: pip install awscli

      - name: Upload to Backblaze B2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          AWS_DEFAULT_REGION: us-east-005
        run: |
          aws s3 cp "${{ env.BACKUP_FILE }}" \
            "s3://${{ secrets.B2_BUCKET_NAME }}/mongodb-backups/${{ env.BACKUP_FILE }}" \
            --endpoint-url "${{ secrets.B2_ENDPOINT }}"

          echo "✅ Uploaded to B2: mongodb-backups/${{ env.BACKUP_FILE }}"

      - name: Prune old backups (keep last 30)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          AWS_DEFAULT_REGION: us-east-005
        run: |
          aws s3 ls "s3://${{ secrets.B2_BUCKET_NAME }}/mongodb-backups/" \
            --endpoint-url "${{ secrets.B2_ENDPOINT }}" \
            | sort \
            | head -n -120 \
            | awk '{print $4}' \
            | while read file; do
                echo "🗑️  Deleting old backup: $file"
                aws s3 rm "s3://${{ secrets.B2_BUCKET_NAME }}/mongodb-backups/$file" \
                  --endpoint-url "${{ secrets.B2_ENDPOINT }}"
              done

      - name: Notify success
        if: success()
        run: |
          echo "🎉 Backup complete!"
          echo "  File : mongodb-backups/${{ env.BACKUP_FILE }}"
          echo "  Time : ${{ env.TIMESTAMP }}"
          echo "  Bucket: ${{ secrets.B2_BUCKET_NAME }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Backup failed. Check the logs above."
